name: Post report to Telegram

on:
  push:
    branches: [main]
    paths:
      - 'reports/**'
  workflow_dispatch:
    inputs:
      file:
        description: 'Path to the report file (e.g. reports/2026-05-08.md). Blank = newest in reports/.'
        required: false
        default: ''
      force:
        description: 'Re-post even if state/posted.json shows this file already went out.'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write  # needed to commit state/ updates back

concurrency:
  group: telegram-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests==2.32.3

      - name: Determine report file + category
        id: pick
        env:
          DISPATCH_FILE: ${{ github.event.inputs.file }}
        shell: bash
        run: |
          set -euo pipefail
          target=""

          # Trim whitespace from the dispatch input — easy to paste with a stray space.
          DISPATCH_FILE="$(printf '%s' "${DISPATCH_FILE:-}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          if [ -n "$DISPATCH_FILE" ]; then
            target="$DISPATCH_FILE"
            echo "Using workflow_dispatch input: $target"
          else
            # Path 1: files added/modified in the push (only meaningful for `on: push`).
            html_pick=""
            md_pick=""
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              mapfile -t changed < <(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" -- 'reports/' 2>/dev/null || true)
              for f in "${changed[@]}"; do
                case "$f" in
                  reports/*.html|reports/*/*.html) html_pick="$f" ;;
                  reports/*.md|reports/*/*.md)    md_pick="$f" ;;
                esac
              done
            fi

            if [ -n "$html_pick" ]; then
              target="$html_pick"
            elif [ -n "$md_pick" ]; then
              target="$md_pick"
            else
              # Path 2 (workflow_dispatch with no input): find the newest report
              # under reports/ recursively. Sorted by mtime descending; falls
              # back to alphabetical (filenames are YYYY-MM-DD so that works too).
              target=$(find reports -type f \( -name '*.md' -o -name '*.html' \) ! -name '.gitkeep' -printf '%T@ %p\n' 2>/dev/null \
                       | sort -rn | head -n 1 | cut -d' ' -f2-)
            fi
          fi

          if [ -z "$target" ] || [ ! -f "$target" ]; then
            echo "::error::No report file found to post."
            exit 1
          fi

          # Category routing: reports/<category>/YYYY-MM-DD.{md,html} -> <category>
          # reports/YYYY-MM-DD.{md,html} (legacy root layout) -> default category
          rel="${target#reports/}"
          if [[ "$rel" == */* ]]; then
            category="${rel%%/*}"
          else
            category=""  # script falls back to default_category from topics.json
          fi

          echo "file=$target" >> "$GITHUB_OUTPUT"
          echo "category=$category" >> "$GITHUB_OUTPUT"
          echo "Selected file: $target"
          echo "Category:      ${category:-(default)}"

      - name: Post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          REPORT_FILE: ${{ steps.pick.outputs.file }}
          REPORT_CATEGORY: ${{ steps.pick.outputs.category }}
          FORCE_REPOST: ${{ github.event.inputs.force || 'false' }}
        run: python .github/scripts/post_to_telegram.py

      - name: Commit state changes
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore(state): record posted report + pinned message [skip ci]"
          # Pull-then-push to survive a tight race with another workflow.
          git pull --rebase --autostash origin main
          git push origin main

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          REPORT_FILE: ${{ steps.pick.outputs.file }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .github/scripts/notify_failure.py
